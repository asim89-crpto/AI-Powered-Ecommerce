name: AI Ecommerce CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Packages
        run: dotnet restore AI-PoweredEcommerce/AI-PoweredEcommerce.csproj

      - name: Build Project
        run: dotnet build AI-PoweredEcommerce/AI-PoweredEcommerce.csproj --configuration Release --no-restore

      - name: Publish Project
        run: dotnet publish AI-PoweredEcommerce/AI-PoweredEcommerce.csproj -c Release -o publish

      - name: Build Docker Image
        run: docker build -t ai-powered-ecommerce .